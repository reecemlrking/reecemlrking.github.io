name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - release # Trigger on push to the release branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    - name: Install dependencies
      run: npm install

    - name: Deploy to GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }} # Use the repository secret
      run: |
        npm run ng -- deploy --base-href=/reecemlrking.github.io/ --name="reecemlrking" --email="reeceking9922@gmail.com:"
