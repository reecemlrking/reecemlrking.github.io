name: Build and Deploy
on:
  push:
    branches:
      - release
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v2
      with: 
        node-version: 25
    - name: Install Dependencies
      run: npm install

    - name: Build Angular App
      run: npm run build

    - name: Deploy to gh pages
      run: |
          ng deploy --dir=dist/personal-site --no-silent --name="Reece King" --email="reeceking9922@gmail.com"
      env:
        CI: true
        GH_TOKEN: ${{ secrets.MY_PAT }}
